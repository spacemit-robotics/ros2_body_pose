body_pose_node:
  ros__parameters:
    config_path: ""
    lazy_load: true
    score_threshold: 0.25
    image_topic: "/camera/image_raw"   # 直连摄像头时发布到此话题；订阅模式时从此话题收图
    body_poses_topic: "/perception/body_poses"
    debug_image_topic: "/body_pose/debug_image"
    use_camera: true    # true=直连摄像头并发布 /camera/image_raw；false=订阅 image_topic
    camera_id: 1
    camera_fps: 30.0
